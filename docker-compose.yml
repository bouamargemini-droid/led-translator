services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: led-translator
    ports:
      - "3210:3210"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
